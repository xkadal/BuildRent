<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Категорії</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <h1 class="mb-3"><i class="bi bi-tags"></i> Категорії</h1>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr><th>Назва</th><th>Slug</th><th>Іконка</th><th>Порядок</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${categories}">
                            <td><strong th:text="${c.name}">—</strong></td>
                            <td class="small text-muted" th:text="${c.slug}">—</td>
                            <td><i th:class="${c.iconClass}"></i> <span class="small text-muted" th:text="${c.iconClass}"></span></td>
                            <td th:text="${c.sortOrder}">0</td>
                            <td class="text-end">
                                <form th:action="@{'/admin/categories/' + ${c.id} + '/delete'}" method="post" class="d-inline"
                                      onsubmit="return confirm('Видалити категорію?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Нова категорія</h5>
                    <form th:action="@{/admin/categories}" method="post" th:object="${category}" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="col-md-12">
                            <label class="form-label">Назва</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Slug</label>
                            <input type="text" th:field="*{slug}" class="form-control" placeholder="auto">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Порядок</label>
                            <input type="number" th:field="*{sortOrder}" class="form-control" value="0">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Іконка (Bootstrap Icons class)</label>
                            <input type="text" th:field="*{iconClass}" class="form-control" placeholder="bi bi-tools">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Опис</label>
                            <textarea th:field="*{description}" rows="2" class="form-control"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Додати</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
