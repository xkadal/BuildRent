<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Користувачі</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <h1 class="mb-3"><i class="bi bi-people"></i> Користувачі</h1>

    <ul class="nav nav-pills mb-3 flex-wrap">
        <li class="nav-item">
            <a th:href="@{/admin/users}" class="nav-link"
               th:classappend="${activeRole == null ? 'active' : ''}">Усі</a>
        </li>
        <li class="nav-item" th:each="r : ${roles}">
            <a th:href="@{/admin/users(role=${r})}" class="nav-link"
               th:classappend="${activeRole != null and activeRole.name() == r.name() ? 'active' : ''}"
               th:text="${r.name()}"></a>
        </li>
    </ul>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr><th>Email</th><th>ПІБ</th><th>Телефон</th><th>Роль</th><th>Статус</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="u : ${page.content}">
                    <td><strong th:text="${u.email}"></strong>
                        <div class="small text-muted" th:text="${#temporals.format(u.createdAt,'dd.MM.yyyy')}"></div></td>
                    <td th:text="${u.fullName()}"></td>
                    <td th:text="${u.phone}"></td>
                    <td>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/role'}" method="post" class="d-flex gap-1">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <select name="role" class="form-select form-select-sm" style="width:auto;">
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name()}"
                                        th:selected="${u.role == r}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-secondary">OK</button>
                        </form>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${u.enabled ? 'bg-success' : 'bg-danger'}"
                              th:text="${u.enabled ? 'Активний' : 'Заблоковано'}"></span>
                    </td>
                    <td>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/toggle-enabled'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-warning">
                                <i th:class="${u.enabled ? 'bi bi-lock' : 'bi bi-unlock'}"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${i}, role=${activeRole})}" th:text="${i + 1}">1</a>
            </li>
        </ul>
    </nav>
</div>
</main>
</body>
</html>
