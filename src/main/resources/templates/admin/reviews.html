<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Модерація відгуків</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <h1 class="mb-3"><i class="bi bi-chat-left-quote"></i> Модерація відгуків</h1>

    <div class="empty-state" th:if="${page.totalElements == 0}">
        <i class="bi bi-check-all"></i>
        <p class="mb-0 mt-2">Немає відгуків на модерацію</p>
    </div>

    <div th:each="r : ${page.content}" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <strong th:text="${r.client.fullName()}">Клієнт</strong>
                    <span class="text-muted small ms-2"
                          th:text="${#temporals.format(r.createdAt,'dd.MM.yyyy HH:mm')}"></span>
                    <div class="small text-muted">Обладнання:
                        <a th:href="@{'/catalog/' + ${r.equipment.slug}}" th:text="${r.equipment.name}"></a>
                    </div>
                </div>
                <span th:replace="~{fragments/status-badge :: rating(${r.rating})}"></span>
            </div>
            <p class="mt-2 mb-3" th:text="${r.text}">Текст відгуку</p>
            <div class="d-flex gap-2">
                <form th:action="@{'/admin/reviews/' + ${r.id} + '/approve'}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-sm btn-success"><i class="bi bi-check-lg"></i> Схвалити</button>
                </form>
                <form th:action="@{'/admin/reviews/' + ${r.id} + '/delete'}" method="post"
                      onsubmit="return confirm('Видалити відгук?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Видалити</button>
                </form>
            </div>
        </div>
    </div>

    <nav class="mt-4" th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/reviews(page=${i})}" th:text="${i + 1}">1</a>
            </li>
        </ul>
    </nav>
</div>
</main>
</body>
</html>
