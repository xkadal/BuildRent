<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Обладнання — форма</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/admin/equipment}">Обладнання</a></li>
            <li class="breadcrumb-item active" th:text="${equipment.id == null ? 'Нове' : equipment.name}"></li>
        </ol>
    </nav>

    <h1 class="mb-3" th:text="${equipment.id == null ? 'Нове обладнання' : 'Редагування'}"></h1>

    <form th:action="@{/admin/equipment/save}" method="post" enctype="multipart/form-data" class="row g-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="id" th:value="${equipment.id}">

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title">Основне</h5>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Назва</label>
                            <input type="text" name="name" th:value="${equipment.name}" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Slug</label>
                            <input type="text" name="slug" th:value="${equipment.slug}" class="form-control" placeholder="auto">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Категорія</label>
                            <select name="categoryId" class="form-select" required>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                                        th:selected="${equipment.category != null and equipment.category.id == c.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Бренд</label>
                            <input type="text" name="brand" th:value="${equipment.brand}" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Модель</label>
                            <input type="text" name="model" th:value="${equipment.model}" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Короткий опис</label>
                            <input type="text" name="shortDescription" th:value="${equipment.shortDescription}"
                                   class="form-control" maxlength="280">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Повний опис</label>
                            <textarea name="description" rows="6" class="form-control"
                                      th:text="${equipment.description}"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm" th:if="${equipment.id != null}">
                <div class="card-body">
                    <h5 class="card-title">Фото</h5>
                    <div class="d-flex flex-wrap gap-2 mb-3" th:if="${not #lists.isEmpty(equipment.images)}">
                        <div th:each="img : ${equipment.images}" class="position-relative"
                             style="width:120px;height:90px;">
                            <img th:src="${img.url}" class="w-100 h-100"
                                 style="object-fit:cover;border-radius:.25rem;border:2px solid #eee;"
                                 th:classappend="${img.main} ? 'border-primary' : ''">
                            <form th:action="@{'/admin/equipment/' + ${equipment.id} + '/image/' + ${img.id} + '/delete'}"
                                  method="post" class="position-absolute top-0 end-0 m-1">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-danger py-0"><i class="bi bi-x"></i></button>
                            </form>
                        </div>
                    </div>
                    <label class="form-label">Додати зображення</label>
                    <input type="file" name="image" accept="image/*" class="form-control">
                </div>
            </div>
        </div>

        <aside class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Параметри</h5>
                    <div class="mb-3">
                        <label class="form-label">Ціна за добу, ₴</label>
                        <input type="number" step="0.01" min="0" name="pricePerDay"
                               th:value="${equipment.pricePerDay}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Застава, ₴</label>
                        <input type="number" step="0.01" min="0" name="deposit"
                               th:value="${equipment.deposit}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Кількість одиниць</label>
                        <input type="number" min="1" name="quantityTotal"
                               th:value="${equipment.quantityTotal}" class="form-control" required>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" name="active" value="true" id="cb-active" class="form-check-input"
                               th:checked="${equipment.active}">
                        <label for="cb-active" class="form-check-label">Активне (показувати в каталозі)</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Зберегти</button>
                        <a th:href="@{/admin/equipment}" class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </div>
            </div>
        </aside>
    </form>
</div>
</main>
</body>
</html>
