<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Додати обладнання</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h3 class="mb-4">Додати обладнання</h3>
                <div class="card shadow">
                    <div class="card-body">
                        <form th:action="@{/admin/equipment/save}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Назва</label>
                                <input type="text" id="name" name="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Опис</label>
                                <textarea id="description" name="description" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="categoryId" class="form-label">Категорія</label>
                                    <select id="categoryId" name="categoryId" class="form-select" required>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Категорія</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="pricePerDay" class="form-label">Ціна за добу (грн)</label>
                                    <input type="number" id="pricePerDay" name="pricePerDay" class="form-control" step="0.01" min="0" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="quantity" class="form-label">Кількість</label>
                                    <input type="number" id="quantity" name="quantity" class="form-control" min="1" value="1" required>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle"></i> Зберегти
                                </button>
                                <a th:href="@{/admin}" class="btn btn-secondary">Скасувати</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
