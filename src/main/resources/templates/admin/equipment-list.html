<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Обладнання</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="mb-0"><i class="bi bi-tools"></i> Обладнання</h1>
        <a th:href="@{/admin/equipment/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Додати обладнання
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr><th></th><th>Назва</th><th>Категорія</th><th>Бренд</th><th>Ціна/доба</th>
                    <th class="text-center">К-сть</th><th>Статус</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="e : ${page.content}">
                    <td style="width:80px;">
                        <img th:src="${e.mainImage() != null ? e.mainImage().url : 'https://via.placeholder.com/60?text=BR'}"
                             style="width:60px;height:45px;object-fit:cover;border-radius:.25rem;" alt="">
                    </td>
                    <td><strong th:text="${e.name}">—</strong>
                        <div class="small text-muted" th:text="${e.slug}"></div></td>
                    <td th:text="${e.category.name}">—</td>
                    <td th:text="${e.brand}">—</td>
                    <td th:text="${#numbers.formatDecimal(e.pricePerDay,0,'NONE',0,'NONE')} + ' ₴'"></td>
                    <td class="text-center" th:text="${e.quantityTotal}">1</td>
                    <td>
                        <span class="badge" th:classappend="${e.active ? 'bg-success' : 'bg-secondary'}"
                              th:text="${e.active ? 'Активне' : 'Прихов.'}"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{'/admin/equipment/' + ${e.id} + '/edit'}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{'/admin/equipment/' + ${e.id} + '/delete'}" method="post" class="d-inline"
                              onsubmit="return confirm('Деактивувати?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-eye-slash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/equipment(page=${i})}" th:text="${i + 1}">1</a>
            </li>
        </ul>
    </nav>
</div>
</main>
</body>
</html>
