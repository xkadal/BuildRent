<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Замовлення оплачено</title></head>
<body>
<main layout:fragment="content">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body p-5">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    <h1 class="mt-3 mb-2">Дякуємо за замовлення!</h1>
                    <p class="text-muted mb-4">
                        Замовлення № <strong th:text="${rental.orderNumber}">BR-...</strong>
                        успішно оплачено. Менеджер зв'яжеться з вами для підтвердження.
                    </p>

                    <div class="row text-start g-3 mb-4">
                        <div class="col-sm-6">
                            <small class="text-muted d-block">Сума</small>
                            <strong class="fs-5" th:text="${#numbers.formatDecimal(rental.total,0,'NONE',0,'NONE')} + ' ₴'"></strong>
                        </div>
                        <div class="col-sm-6">
                            <small class="text-muted d-block">Період</small>
                            <strong>
                                <span th:text="${#temporals.format(rental.startDate,'dd.MM.yyyy')}"></span> –
                                <span th:text="${#temporals.format(rental.endDate,'dd.MM.yyyy')}"></span>
                            </strong>
                        </div>
                        <div class="col-sm-6">
                            <small class="text-muted d-block">Спосіб отримання</small>
                            <strong th:text="${rental.deliveryType.name() == 'DELIVERY' ? 'Доставка' : 'Самовивіз'}"></strong>
                        </div>
                        <div class="col-sm-6" th:if="${rental.deliveryAddress != null}">
                            <small class="text-muted d-block">Адреса</small>
                            <strong th:text="${rental.deliveryAddress}"></strong>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                        <a th:href="@{'/account/orders/' + ${rental.orderNumber}}" class="btn btn-primary">
                            <i class="bi bi-receipt"></i> Деталі замовлення
                        </a>
                        <a th:href="@{/catalog}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Повернутись у каталог
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
