<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title th:text="${equipment.name}">Обладнання</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/catalog}">Каталог</a></li>
                <li class="breadcrumb-item active" th:text="${equipment.name}">Обладнання</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-7">
                <span class="badge bg-secondary mb-2" th:text="${equipment.category.name}">Категорія</span>
                <h2 th:text="${equipment.name}">Назва обладнання</h2>
                <p class="lead" th:text="${equipment.description}">Опис</p>

                <ul class="list-unstyled mt-4">
                    <li class="mb-2">
                        <i class="bi bi-cash-coin text-primary"></i>
                        Ціна: <strong th:text="${equipment.pricePerDay} + ' грн/добу'">Ціна</strong>
                    </li>
                    <li class="mb-2">
                        <i class="bi bi-boxes text-primary"></i>
                        В наявності: <strong th:text="${equipment.quantity} + ' шт.'">Кількість</strong>
                    </li>
                    <li class="mb-2">
                        <i class="bi bi-check-circle text-primary"></i>
                        Статус:
                        <span th:if="${equipment.available}" class="text-success fw-bold">Доступно</span>
                        <span th:unless="${equipment.available}" class="text-danger fw-bold">Недоступно</span>
                    </li>
                </ul>
            </div>

            <div class="col-md-5">
                <div class="card shadow" sec:authorize="isAuthenticated()">
                    <div class="card-body">
                        <h5 class="card-title">Оформити прокат</h5>
                        <form th:action="@{/rentals/create}" method="post">
                            <input type="hidden" name="equipmentId" th:value="${equipment.id}">
                            <div class="mb-3">
                                <label for="startDate" class="form-label">Дата початку</label>
                                <input type="date" id="startDate" name="startDate" class="form-control" required
                                       th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                            </div>
                            <div class="mb-3">
                                <label for="endDate" class="form-label">Дата закінчення</label>
                                <input type="date" id="endDate" name="endDate" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" th:disabled="${!equipment.available}">
                                <i class="bi bi-cart-check"></i> Орендувати
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card shadow" sec:authorize="isAnonymous()">
                    <div class="card-body text-center">
                        <p class="mb-3">Для оформлення прокату необхідно увійти в систему</p>
                        <a th:href="@{/login}" class="btn btn-primary">
                            <i class="bi bi-box-arrow-in-right"></i> Увійти
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
