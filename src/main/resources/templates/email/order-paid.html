<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${subject}">BuildRent</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f5f7;margin:0;padding:24px;">
<table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0"
       style="background:#fff;border-radius:8px;overflow:hidden;">
    <tr><td style="background:#1f2733;color:#fff;padding:18px 24px;">
        <h2 style="margin:0;">BuildRent</h2></td></tr>
    <tr><td style="padding:24px;">
        <p>Дякуємо, <strong th:text="${client.fullName()}">Клієнт</strong>!</p>
        <p>Оплата за замовлення <strong th:text="${rental.orderNumber}">№</strong> успішно отримана.
            Сума: <strong th:text="${#numbers.formatDecimal(rental.total,0,'NONE',0,'NONE')} + ' ₴'"></strong>.</p>
        <p>Ваше обладнання буде підготовлене до початку оренди
            (<span th:text="${#temporals.format(rental.startDate,'dd.MM.yyyy')}"></span>).</p>
    </td></tr>
</table>
</body>
</html>
