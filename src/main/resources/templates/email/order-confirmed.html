<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${subject}">BuildRent</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f5f7;margin:0;padding:24px;">
<table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0"
       style="background:#fff;border-radius:8px;overflow:hidden;">
    <tr><td style="background:#1f2733;color:#fff;padding:18px 24px;">
        <h2 style="margin:0;">BuildRent</h2></td></tr>
    <tr><td style="padding:24px;">
        <p>Вітаємо, <strong th:text="${client.fullName()}">Клієнт</strong>!</p>
        <p>Замовлення <strong th:text="${rental.orderNumber}">№</strong> підтверджено менеджером.
            Дякуємо за вибір BuildRent. Очікуємо оплату для переходу до наступного кроку.</p>
        <p>До сплати: <strong style="color:#ea7a1f;font-size:1.1em;"
            th:text="${#numbers.formatDecimal(rental.total,0,'NONE',0,'NONE')} + ' ₴'"></strong></p>
    </td></tr>
</table>
</body>
</html>
