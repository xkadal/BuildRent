<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Профіль</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <h1 class="mb-4"><i class="bi bi-person-circle"></i> Особистий кабінет</h1>

    <div class="row g-4">
        <aside class="col-lg-3">
            <div class="list-group list-group-flush sticky-top" style="top: 90px;">
                <a th:href="@{/account/profile}" class="list-group-item list-group-item-action active">
                    <i class="bi bi-person"></i> Профіль
                </a>
                <a th:href="@{/account/orders}" class="list-group-item list-group-item-action">
                    <i class="bi bi-bag"></i> Мої замовлення
                </a>
            </div>
        </aside>

        <div class="col-lg-9">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Особисті дані</h5>
                    <p class="text-muted small mb-3">
                        Email: <strong th:text="${user.email}">—</strong> ·
                        Зареєстровано: <span th:text="${#temporals.format(user.createdAt,'dd.MM.yyyy')}"></span>
                    </p>
                    <form th:action="@{/account/profile}" th:object="${profileForm}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="col-md-6">
                            <label class="form-label">Ім'я</label>
                            <input type="text" th:field="*{firstName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Прізвище</label>
                            <input type="text" th:field="*{lastName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{lastName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Телефон</label>
                            <input type="tel" th:field="*{phone}" class="form-control"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{phone}"></div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Зберегти</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Зміна паролю</h5>
                    <form th:action="@{/account/profile/password}" th:object="${passwordForm}" method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="col-md-4">
                            <label class="form-label">Поточний пароль</label>
                            <input type="password" th:field="*{currentPassword}" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Новий пароль</label>
                            <input type="password" th:field="*{newPassword}" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Підтвердіть</label>
                            <input type="password" th:field="*{confirmPassword}" class="form-control">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-outline-primary"><i class="bi bi-key"></i> Змінити пароль</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
