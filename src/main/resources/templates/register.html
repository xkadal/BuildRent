<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Реєстрація</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Реєстрація</h3>

                        <form th:action="@{/register}" th:object="${registrationDto}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">Ім'я</label>
                                    <input type="text" id="firstName" th:field="*{firstName}" class="form-control"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{firstName}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Прізвище</label>
                                    <input type="text" id="lastName" th:field="*{lastName}" class="form-control"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{lastName}"></div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Телефон</label>
                                <input type="tel" id="phone" th:field="*{phone}" class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Підтвердження паролю</label>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
                        </form>

                        <p class="text-center mt-3 mb-0">
                            Вже є акаунт? <a th:href="@{/login}">Увійти</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
