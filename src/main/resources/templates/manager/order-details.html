<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title th:text="'Замовлення ' + ${rental.orderNumber}">Замовлення</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/manager/orders}">Замовлення</a></li>
            <li class="breadcrumb-item active" th:text="${rental.orderNumber}"></li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="mb-0">
            <span th:text="${rental.orderNumber}">№</span>
        </h1>
        <div>
            <span th:replace="~{fragments/status-badge :: badge(${rental.status})}"></span>
            <span th:replace="~{fragments/status-badge :: paymentBadge(${rental.paymentStatus})}"></span>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title">Клієнт</h5>
                    <p class="mb-1"><strong th:text="${rental.client.fullName()}">—</strong></p>
                    <p class="mb-1 small text-muted">
                        <i class="bi bi-envelope"></i> <span th:text="${rental.client.email}"></span> ·
                        <i class="bi bi-telephone"></i> <span th:text="${rental.client.phone}"></span>
                    </p>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title">Позиції</h5>
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr><th>Обладнання</th><th class="text-center">К-сть</th>
                            <th class="text-center">Днів</th><th class="text-end">Сума</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="i : ${rental.items}">
                            <td th:text="${i.equipment.name}">Назва</td>
                            <td class="text-center" th:text="${i.quantity}">1</td>
                            <td class="text-center" th:text="${i.daysCount}">1</td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(i.lineTotal,0,'NONE',0,'NONE')} + ' ₴'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Доставка та коментар</h5>
                    <p class="mb-1"><strong>Спосіб:</strong>
                        <span th:text="${rental.deliveryType.name() == 'DELIVERY' ? 'Доставка' : 'Самовивіз'}"></span></p>
                    <p class="mb-1" th:if="${rental.deliveryAddress != null}">
                        <strong>Адреса:</strong> <span th:text="${rental.deliveryAddress}"></span></p>
                    <p class="mb-0" th:if="${rental.clientNotes != null and !rental.clientNotes.isEmpty()}">
                        <strong>Коментар клієнта:</strong> <em th:text="${rental.clientNotes}"></em></p>
                </div>
            </div>
        </div>

        <aside class="col-lg-4">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title">Дії</h5>
                    <p class="small text-muted mb-2">Поточний статус:
                        <span th:replace="~{fragments/status-badge :: badge(${rental.status})}"></span>
                    </p>

                    <div class="d-grid gap-2">
                        <form th:if="${rental.status.name() == 'PENDING'}"
                              th:action="@{'/manager/orders/' + ${rental.orderNumber} + '/transition'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="next" value="CONFIRMED">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-lg"></i> Підтвердити
                            </button>
                        </form>

                        <form th:if="${rental.status.name() == 'PAID'}"
                              th:action="@{'/manager/orders/' + ${rental.orderNumber} + '/transition'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="next" value="ACTIVE">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-truck"></i> Видати в оренду
                            </button>
                        </form>

                        <form th:if="${rental.status.name() == 'ACTIVE'}"
                              th:action="@{'/manager/orders/' + ${rental.orderNumber} + '/transition'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="next" value="RETURNED">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-arrow-counterclockwise"></i> Прийняти повернення
                            </button>
                        </form>

                        <form th:if="${rental.status.name() == 'PENDING' or rental.status.name() == 'CONFIRMED' or rental.status.name() == 'PAID'}"
                              th:action="@{'/manager/orders/' + ${rental.orderNumber} + '/transition'}" method="post"
                              onsubmit="return confirm('Скасувати замовлення?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="next" value="CANCELLED">
                            <button type="submit" class="btn btn-outline-danger w-100">
                                <i class="bi bi-x-lg"></i> Скасувати
                            </button>
                        </form>

                        <div th:if="${rental.status.name() == 'RETURNED' or rental.status.name() == 'CANCELLED'}"
                             class="alert alert-secondary mb-0 small">
                            Замовлення завершено, дії недоступні
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Фінанси</h5>
                    <table class="table table-sm table-borderless mb-0">
                        <tr><td class="text-muted">Підсумок</td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(rental.subtotal,0,'NONE',0,'NONE')} + ' ₴'"></td></tr>
                        <tr><td class="text-muted">Доставка</td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(rental.deliveryFee,0,'NONE',0,'NONE')} + ' ₴'"></td></tr>
                        <tr class="border-top"><td class="fw-bold">Усього</td>
                            <td class="text-end fw-bold text-primary"
                                th:text="${#numbers.formatDecimal(rental.total,0,'NONE',0,'NONE')} + ' ₴'"></td></tr>
                        <tr th:if="${rental.paidAt != null}">
                            <td class="text-muted small">Оплачено</td>
                            <td class="text-end small"
                                th:text="${#temporals.format(rental.paidAt,'dd.MM.yyyy HH:mm')}"></td></tr>
                    </table>
                </div>
            </div>
        </aside>
    </div>
</div>
</main>
</body>
</html>
