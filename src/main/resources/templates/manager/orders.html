<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head><title>Менеджер — Замовлення</title></head>
<body>
<main layout:fragment="content">
<div class="container py-4">
    <h1 class="mb-3"><i class="bi bi-list-check"></i> Замовлення</h1>

    <ul class="nav nav-pills mb-3 flex-wrap">
        <li class="nav-item">
            <a th:href="@{/manager/orders}"
               th:classappend="${activeStatus == null ? 'active' : ''}"
               class="nav-link">Усі</a>
        </li>
        <li class="nav-item" th:each="s : ${statuses}">
            <a th:href="@{/manager/orders(status=${s})}"
               th:classappend="${activeStatus != null and activeStatus.name() == s.name() ? 'active' : ''}"
               class="nav-link" th:text="${s.name()}"></a>
        </li>
    </ul>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr><th>№</th><th>Клієнт</th><th>Період</th><th>Сума</th><th>Статус</th><th>Оплата</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="r : ${page.content}">
                    <td><strong th:text="${r.orderNumber}">№</strong>
                        <div class="small text-muted" th:text="${#temporals.format(r.createdAt,'dd.MM.yyyy HH:mm')}"></div></td>
                    <td>
                        <span th:text="${r.client.fullName()}">Клієнт</span>
                        <div class="small text-muted" th:text="${r.client.phone}"></div>
                    </td>
                    <td class="small">
                        <span th:text="${#temporals.format(r.startDate,'dd.MM.yyyy')}"></span> –
                        <span th:text="${#temporals.format(r.endDate,'dd.MM.yyyy')}"></span>
                    </td>
                    <td><strong th:text="${#numbers.formatDecimal(r.total,0,'NONE',0,'NONE')} + ' ₴'"></strong></td>
                    <td><span th:replace="~{fragments/status-badge :: badge(${r.status})}"></span></td>
                    <td><span th:replace="~{fragments/status-badge :: paymentBadge(${r.paymentStatus})}"></span></td>
                    <td class="text-end">
                        <a th:href="@{'/manager/orders/' + ${r.orderNumber}}" class="btn btn-sm btn-outline-primary">
                            Деталі <i class="bi bi-chevron-right"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="7" class="text-center text-muted py-4">Замовлень не знайдено</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{/manager/orders(page=${i}, status=${activeStatus})}"
                   th:text="${i + 1}">1</a>
            </li>
        </ul>
    </nav>
</div>
</main>
</body>
</html>
