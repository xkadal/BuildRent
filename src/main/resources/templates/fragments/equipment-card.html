<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="card(item)" class="card eq-card h-100 position-relative">
    <a th:href="@{/catalog/{slug}(slug=${item.slug})}">
        <img class="eq-card-img"
             th:src="${item.mainImage() != null ? item.mainImage().url : 'https://via.placeholder.com/600x375?text=BuildRent'}"
             th:alt="${item.name}">
    </a>
    <span class="badge bg-dark eq-card-badge" th:text="${item.category.name}">Категорія</span>
    <div class="card-body">
        <div class="small text-muted mb-1" th:if="${item.brand != null}">
            <i class="bi bi-tag"></i> <span th:text="${item.brand}">Бренд</span>
        </div>
        <h6 class="fw-bold mb-2">
            <a class="text-dark stretched-link"
               th:href="@{/catalog/{slug}(slug=${item.slug})}"
               th:text="${item.name}">Назва</a>
        </h6>
        <p class="small text-muted mb-3"
           th:text="${item.shortDescription != null ? item.shortDescription : ''}"></p>
    </div>
    <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-end pt-0">
        <div class="price-block">
            <span class="price" th:text="${#numbers.formatDecimal(item.pricePerDay, 0, 'NONE', 0, 'NONE')} + ' ₴'">350 ₴</span>
            <div class="unit">за добу</div>
        </div>
        <span class="btn btn-sm btn-outline-primary">Деталі <i class="bi bi-arrow-right"></i></span>
    </div>
</div>
</body>
</html>
