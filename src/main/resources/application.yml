spring:
  application:
    name: BuildRent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/build_buildrent}
    username: ${DB_USERNAME:build_buildrent}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8090
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false

buildrent:
  uploads-dir: ${UPLOADS_DIR:./uploads}
  delivery-fee: 200
  email-from: noreply@buildrent.pp.ua

logging:
  level:
    com.vlad.buildrent: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  thymeleaf:
    cache: false
  mail:
    host: localhost
    port: 1025

---
spring:
  config:
    activate:
      on-profile: prod
  thymeleaf:
    cache: true
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
