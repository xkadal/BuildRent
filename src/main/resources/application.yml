spring:
  application:
    name: BuildRent

  datasource:
    url: jdbc:mariadb://localhost:3306/build_buildrent
    username: build_buildrent
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  thymeleaf:
    cache: false

server:
  port: 8090
  servlet:
    context-path: /

logging:
  level:
    com.vlad.buildrent: DEBUG
    org.springframework.security: INFO
